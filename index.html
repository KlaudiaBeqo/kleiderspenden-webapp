<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Kleiderspenden Registrierung</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Kleiderspenden Registrierung</h1>
</header>

<main>
    <form id="donationForm">
        <label>Name:</label>
        <input type="text" id="name" required>

        <label>Postleitzahl:</label>
        <input type="text" id="plz" required>

        <label>Kleidungsart:</label>
        <select id="type">
            <option>Winterkleidung</option>
            <option>Sommerkleidung</option>
        </select>

        <button type="submit">Absenden</button>
    </form>

    <p id="message"></p>
</main>

<script src="script.js"></script>
</body>
</html>
